<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TaskBoard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <div>
            <button class="brand-button" id="addressButton" type="button">TaskBoard</button>
            <p>任务协作备忘录</p>
          </div>
        </div>

        <button class="identity-button identity-menu-button" id="identityButton" type="button" title="编辑身份">
          <span class="avatar-preview" id="avatarPreview"><span id="avatarPreviewIcon">◆</span></span>
          <span id="identityDisplayName">匿名用户</span>
        </button>

        <details class="peer-menu" id="peerMenu">
          <summary>在线用户 <span id="peerCount">0</span></summary>
          <div class="peer-list" id="onlinePeers"></div>
        </details>

        <div class="project-section">
          <div class="section-row">
            <div class="section-label">项目</div>
            <button class="icon-button primary small" id="openProjectCreateButton" type="button" title="新建项目" aria-label="新建项目">+</button>
          </div>
          <div class="project-list" id="activeProjects"></div>
        </div>

        <details class="archive-box" id="archiveBox">
          <summary>归档项目 <span id="archiveCount">0</span></summary>
          <div class="project-list archived" id="archivedProjects"></div>
        </details>
      </aside>

      <main class="board">
        <header class="topbar">
          <div class="project-title">
            <h2 id="selectedProjectName">未选择项目</h2>
          </div>
        </header>

        <section class="transfer-panel hidden" id="transferPanel" aria-label="文件传输">
          <div class="transfer-panel-head">
            <h3>文件传输</h3>
          </div>
          <div class="transfer-list" id="transferList"></div>
        </section>

        <section class="board-columns" id="boardView">
          <div class="column">
            <div class="column-heading">
              <div class="column-title">
                <h3>待接取</h3>
                <span id="openCount">0</span>
              </div>
              <button class="column-action" id="openTaskCreateButton" type="button">新建任务</button>
            </div>
            <div class="task-list" id="openTasks"></div>
          </div>
          <div class="column">
            <div class="column-heading">
              <div class="column-title">
                <h3>已接取</h3>
                <span id="claimedCount">0</span>
              </div>
            </div>
            <div class="task-list" id="claimedTasks"></div>
          </div>
          <div class="column">
            <div class="column-heading">
              <div class="column-title">
                <h3>已完成</h3>
                <span id="doneCount">0</span>
              </div>
            </div>
            <div class="task-list" id="doneTasks"></div>
          </div>
        </section>

        <div class="empty-state hidden" id="emptyState">先创建或选择一个项目</div>
      </main>
    </div>

    <div class="modal hidden" id="identityModal" role="dialog" aria-modal="true" aria-labelledby="identityModalTitle">
      <div class="modal-panel">
        <div class="modal-head">
          <h2 id="identityModalTitle">编辑身份</h2>
          <button class="icon-button" type="button" data-close-modal title="关闭" aria-label="关闭">×</button>
        </div>
        <div class="identity-editor">
          <label>
            姓名
            <input id="identityName" type="text" placeholder="你的姓名" />
          </label>
          <div>
            <div class="field-label">头像图标</div>
            <div class="icon-grid" id="identityIcons"></div>
          </div>
          <div>
            <div class="field-label">头像颜色</div>
            <div class="color-row" id="identityColors"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="addressModal" role="dialog" aria-modal="true" aria-labelledby="addressModalTitle">
      <div class="modal-panel">
        <div class="modal-head">
          <h2 id="addressModalTitle">访问地址</h2>
          <button class="icon-button" type="button" data-close-modal title="关闭" aria-label="关闭">×</button>
        </div>
        <div class="address-list" id="addressList">
          <span>读取中</span>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="projectCreateModal" role="dialog" aria-modal="true" aria-labelledby="projectCreateTitle">
      <form class="modal-panel" id="projectForm">
        <div class="modal-head">
          <h2 id="projectCreateTitle">新建项目</h2>
          <button class="icon-button" type="button" data-close-modal title="关闭" aria-label="关闭">×</button>
        </div>
        <label>
          项目名称
          <input id="projectNameInput" type="text" maxlength="60" placeholder="输入项目名称" />
        </label>
        <div class="modal-actions">
          <button class="secondary-action" type="button" data-close-modal>取消</button>
          <button class="primary-action" type="submit">创建</button>
        </div>
      </form>
    </div>

    <div class="modal hidden" id="projectRenameModal" role="dialog" aria-modal="true" aria-labelledby="projectRenameTitle">
      <form class="modal-panel" id="renameProjectForm">
        <div class="modal-head">
          <h2 id="projectRenameTitle">更改名称</h2>
          <button class="icon-button" type="button" data-close-modal title="关闭" aria-label="关闭">×</button>
        </div>
        <label>
          项目名称
          <input id="renameProjectInput" type="text" maxlength="60" placeholder="项目名称" />
        </label>
        <div class="modal-actions">
          <button class="secondary-action" type="button" data-close-modal>取消</button>
          <button class="primary-action" type="submit">保存</button>
        </div>
      </form>
    </div>

    <div class="modal hidden" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
      <form class="modal-panel wide" id="taskForm">
        <div class="modal-head">
          <h2 id="taskModalTitle">新建任务</h2>
          <button class="icon-button" type="button" data-close-modal title="关闭" aria-label="关闭">×</button>
        </div>
        <label>
          任务描述
          <textarea id="taskDescriptionInput" rows="6" placeholder="写下任务描述"></textarea>
        </label>
        <div>
          <div class="field-label">任务底色</div>
          <div class="task-color-grid" id="taskBackgroundColors"></div>
        </div>
        <label class="checkbox-row">
          <input id="taskPinnedInput" type="checkbox" />
          <span>置顶任务</span>
        </label>
        <div class="modal-actions">
          <button class="secondary-action" type="button" data-close-modal>取消</button>
          <button class="primary-action" type="submit" id="taskSubmitButton">新建</button>
        </div>
      </form>
    </div>

    <div class="modal hidden" id="sendFileModal" role="dialog" aria-modal="true" aria-labelledby="sendFileTitle">
      <div class="modal-panel">
        <div class="modal-head">
          <h2 id="sendFileTitle">发送文件</h2>
          <button class="icon-button" type="button" data-close-modal title="关闭" aria-label="关闭">×</button>
        </div>
        <div class="file-upload-area" id="fileDropZone" role="button" tabindex="0" aria-describedby="sendFileHint">
          <div class="file-upload-icon">↥</div>
          <div class="file-upload-copy">
            <strong>拖放文件到这里</strong>
            <span id="sendFileHint">发送给 <span id="sendFilePeerName">在线用户</span></span>
          </div>
        </div>
        <div class="modal-actions">
          <button class="secondary-action" type="button" data-close-modal>取消</button>
          <button class="primary-action" type="button" id="selectFileButton">从计算机选择</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="incomingTransferModal" role="dialog" aria-modal="true" aria-labelledby="incomingTransferTitle">
      <div class="modal-panel">
        <div class="modal-head">
          <h2 id="incomingTransferTitle">接收文件</h2>
        </div>
        <div class="transfer-request">
          <p><strong id="incomingTransferFrom">匿名用户</strong> 想发送文件</p>
          <div class="transfer-request-file">
            <span id="incomingTransferFileName">未命名文件</span>
            <strong id="incomingTransferFileSize">0 B</strong>
          </div>
        </div>
        <div class="modal-actions">
          <button class="secondary-action" type="button" id="rejectTransferButton">拒绝</button>
          <button class="primary-action" type="button" id="acceptTransferButton">接收</button>
        </div>
      </div>
    </div>

    <input class="hidden" id="fileInput" type="file" />
    <div class="notification-stack" id="notificationStack" aria-live="polite"></div>
    <div class="toast" id="toast" role="status"></div>
    <script src="/app.js"></script>
  </body>
</html>
